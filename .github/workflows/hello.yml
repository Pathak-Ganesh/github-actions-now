---
name: Hello Workflow
on:
  push:
    branches:
      - main
jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: say hello to users
        run: echo "Hello Bhai"
      - name: say hello to username
        run: echo "Hello $USER"
  details:
    runs-on: ubuntu-latest
    steps:
      - name: Name of the version
        run: docker --version && python --version
